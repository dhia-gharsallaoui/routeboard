# Demo HTTPRoutes for RouteBoard screenshots
# Apply: kubectl apply -f docs/demo-routes.yaml
# Remove: kubectl delete -f docs/demo-routes.yaml
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: apps
  annotations:
    routeboard.io/description: "GitOps continuous delivery"
spec:
  hostnames: ["argocd.homelab.ts"]
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - name: argocd-server
          port: 8080

name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Update Chart appVersion
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/routeboard/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/routeboard/Chart.yaml

      - name: Package Helm chart
        run: helm package deploy/helm/routeboard -d /tmp/helm-pkg

      - name: Push Helm chart to GHCR
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm push /tmp/helm-pkg/routeboard-${VERSION}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/helm

  binaries:
    name: Build & Upload Release Binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: cd web && bun install && bun run build

      - name: Embed frontend
        run: |
          rm -rf internal/server/dist
          cp -r web/dist internal/server/dist

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags "-X main.version=${VERSION}" \
              -o dist/routeboard ./cmd/routeboard
            tar -C dist -czf dist/routeboard-linux-${arch}.tar.gz routeboard
            rm dist/routeboard
          done
          (cd dist && sha256sum routeboard-linux-*.tar.gz > checksums.txt)

      - name: Create GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/routeboard-linux-amd64.tar.gz
            dist/routeboard-linux-arm64.tar.gz
            dist/checksums.txt
          generate_release_notes: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "routeboard.fullname" . }}
  labels:
    {{- include "routeboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "routeboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "routeboard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "routeboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: ROUTEBOARD_PORT
              value: {{ .Values.config.port | quote }}
            - name: ROUTEBOARD_WATCH_INGRESS
              value: {{ .Values.config.watchIngress | quote }}
            - name: ROUTEBOARD_WATCH_HTTPROUTE
              value: {{ .Values.config.watchHTTPRoute | quote }}
            - name: ROUTEBOARD_NAMESPACE_DENYLIST
              value: {{ .Values.config.namespaceDenylist | quote }}
            {{- if .Values.config.namespaceAllowlist }}
            - name: ROUTEBOARD_NAMESPACE_ALLOWLIST
              value: {{ .Values.config.namespaceAllowlist | quote }}
            {{- end }}
            {{- if .Values.config.labelSelector }}
            - name: ROUTEBOARD_LABEL_SELECTOR
              value: {{ .Values.config.labelSelector | quote }}
            {{- end }}
            - name: ROUTEBOARD_TITLE
              value: {{ .Values.config.title | quote }}
            - name: ROUTEBOARD_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: ROUTEBOARD_RESYNC_INTERVAL
              value: {{ .Values.config.resyncInterval | quote }}
            - name: ROUTEBOARD_HEALTH_ENABLED
              value: {{ .Values.config.healthEnabled | quote }}
            - name: ROUTEBOARD_HEALTH_INTERVAL
              value: {{ .Values.config.healthInterval | quote }}
            - name: ROUTEBOARD_HEALTH_TIMEOUT
              value: {{ .Values.config.healthTimeout | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

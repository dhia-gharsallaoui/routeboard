apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "routeboard.fullname" . }}
  labels:
    {{- include "routeboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "routeboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "routeboard.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "routeboard.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: ROUTEBOARD_PORT
              value: {{ .Values.config.port | quote }}
            - name: ROUTEBOARD_WATCH_INGRESS
              value: {{ .Values.config.watchIngress | quote }}
            - name: ROUTEBOARD_WATCH_HTTPROUTE
              value: {{ .Values.config.watchHTTPRoute | quote }}
            - name: ROUTEBOARD_NAMESPACE_DENYLIST
              value: {{ .Values.config.namespaceDenylist | quote }}
            {{- if .Values.config.namespaceAllowlist }}
            - name: ROUTEBOARD_NAMESPACE_ALLOWLIST
              value: {{ .Values.config.namespaceAllowlist | quote }}
            {{- end }}
            {{- if .Values.config.labelSelector }}
            - name: ROUTEBOARD_LABEL_SELECTOR
              value: {{ .Values.config.labelSelector | quote }}
            {{- end }}
            - name: ROUTEBOARD_TITLE
              value: {{ .Values.config.title | quote }}
            - name: ROUTEBOARD_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: ROUTEBOARD_RESYNC_INTERVAL
              value: {{ .Values.config.resyncInterval | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # Writable scratch dir so readOnlyRootFilesystem: true does not break the app.
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpDir.sizeLimit }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

suite: Service
templates:
  - templates/service.yaml
tests:
  - it: renders a ClusterIP Service on port 80 by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].name
          value: http

  - it: honors service type and port overrides
    set:
      service:
        type: NodePort
        port: 8080
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: selects pods via the selector labels
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: routeboard
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: adds annotations when set
    set:
      service:
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    asserts:
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-internal"]
          value: "true"

suite: extraManifests
templates:
  - templates/extra-manifests.yaml
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a map manifest and resolves tpl references to the release
    release:
      name: rb
    set:
      extraManifests:
        - apiVersion: gateway.kgateway.dev/v1alpha1
          kind: TrafficPolicy
          metadata:
            name: '{{ include "routeboard.fullname" . }}'
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: '{{ include "routeboard.fullname" . }}'
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: TrafficPolicy
      - equal:
          path: metadata.name
          value: rb-routeboard
      - equal:
          path: spec.targetRefs[0].name
          value: rb-routeboard

  - it: renders a string manifest through tpl
    release:
      name: rb
    set:
      extraManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: '{{ include "routeboard.fullname" . }}-extra'
          data:
            hello: world
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: rb-routeboard-extra
      - equal:
          path: data.hello
          value: world

  - it: renders multiple manifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: a
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: b
    asserts:
      - hasDocuments:
          count: 2

suite: PodDisruptionBudget
templates:
  - templates/pdb.yaml
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders with minAvailable when enabled
    set:
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - isAPIVersion:
          of: policy/v1
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: prefers maxUnavailable when set
    set:
      podDisruptionBudget:
        enabled: true
        maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - notExists:
          path: spec.minAvailable

  - it: selects the RouteBoard pods
    set:
      podDisruptionBudget:
        enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: routeboard
